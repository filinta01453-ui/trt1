<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html,body{
margin:0;
padding:0;
background:black;
width:100%;
height:100%;
overflow:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
background:black;
}
</style>
</head>

<body>

<video id="video" autoplay controls></video>

<script>

var video=document.getElementById("video");
var url="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";

if(Hls.isSupported()){
var hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
}else{
video.src=url;
}

video.onclick=function(){
if(video.paused){
video.play();
}else{
video.pause();
}
}

</script>

</body>
</html>
